name: build

on:
  push:
    branches: [main]
    paths-ignore: &docs
      - '**.md'
      - 'demo/**'
      - 'LICENSE-*'
      - '.gitignore'
      - 'bpfimp.toml.example'
  pull_request:
    paths-ignore: *docs
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Cache Nix Store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: cargo fmt
        run: nix develop -c cargo fmt --all -- --check

      - name: cargo clippy (workspace)
        run: nix develop -c cargo clippy --workspace --exclude bpfimp-ebpf --all-targets -- -D warnings

      - name: cargo clippy (ebpf)
        run: nix develop -c cargo clippy --package bpfimp-ebpf --target bpfel-unknown-none -Z build-std=core -- -D warnings

      - name: cargo build (release)
        run: nix develop -c cargo build --workspace --exclude bpfimp-ebpf --release

      # bpfimp-ebpf is no_std and targets bpfel-unknown-none, so it has no
      # host-runnable tests; it's still compiled as a build dependency above.
      - name: cargo test
        run: nix develop -c cargo test --workspace --exclude bpfimp-ebpf
